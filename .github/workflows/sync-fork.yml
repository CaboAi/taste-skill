name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream ${{ github.event.repository.source.clone_url }}
          git fetch upstream

          UPSTREAM_BRANCH=$(git symbolic-ref refs/remotes/upstream/HEAD | sed 's@^refs/remotes/upstream/@@')
          git checkout $UPSTREAM_BRANCH 2>/dev/null || git checkout main 2>/dev/null || git checkout master
          git merge --no-edit upstream/$UPSTREAM_BRANCH
          git push origin HEAD
